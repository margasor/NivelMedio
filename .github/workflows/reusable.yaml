name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      run-compile:
        required: false
        default: true
        type: boolean
      run-tests:
        required: false
        default: true
        type: boolean
      src-path:
        required: false
        default: "src"
        type: string
      tests-path:
        required: false
        default: "tests"
        type: string

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (del repo que llama)
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Mostrar info del entorno
        run: |
          python --version
          python -c "import sys; print('sys.path:', sys.path)"

      - name: Compilar código (si existe src)
        if: inputs.run-compile
        run: |
          if [ -d "${{ inputs.src-path }}" ]; then
            echo "✅ Compilando ${{ inputs.src-path }}"
            python -m compileall "${{ inputs.src-path }}"
          else
            echo "⚠️ No existe '${{ inputs.src-path }}' en el repo caller. Me salto compile."
          fi

      - name: Ejecutar tests unittest (si existe tests)
        if: inputs.run-tests
        run: |
          if [ -d "${{ inputs.tests-path }}" ]; then
            echo "✅ Ejecutando tests en ${{ inputs.tests-path }}"
            export PYTHONPATH="$GITHUB_WORKSPACE"
            python -m unittest discover -s "${{ inputs.tests-path }}" -p "test_*.py" -v
          else
            echo "⚠️ No existe '${{ inputs.tests-path }}' en el repo caller. Me salto tests."
          fi
