name: Reusable Python (compile + unittest)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Versión de Python a usar"
        required: true
        type: string
      src-path:
        description: "Carpeta del código"
        required: false
        default: "src"
        type: string
      tests-path:
        description: "Carpeta de tests"
        required: false
        default: "tests"
        type: string

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout (del repo que llama)
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Validación rápida (compilar código)
        run: |
          python -m compileall ${{ inputs.src-path }}

      - name: Ejecutar tests (unittest)
        run: |
          python -m unittest discover -s ${{ inputs.tests-path }} -p "test_*.py" -v
